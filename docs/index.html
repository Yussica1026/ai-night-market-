<!doctype html><html lang="zh-CN"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AI 夜市</title><style>body{margin:0;min-height:100vh;background:#171022;color:#fff;font-family:system-ui;text-align:center}main{max-width:700px;margin:auto;padding:32px}.market{background:#312044;border:2px solid #ffb35c;border-radius:24px;padding:24px;box-shadow:0 0 45px #ff4b8b55}button{padding:12px 20px;border:0;border-radius:10px;background:#ffb35c;font-weight:bold;cursor:pointer}.card{margin:14px 0;padding:14px;background:#fff1df;color:#2b1833;border-radius:14px;text-align:left}.small{color:#d4b9e8}</style><main><h1>AI 夜市</h1><p class="small">和 AI NPC 摊主逛夜市，收集食材，升级自己的小摊。</p><section class="market"><h2 id="title">夜市刚开张</h2><p id="text">点击逛逛，看看谁在等你。</p><button id="visit">逛夜市</button><p>夜市币：<b id="coins">50</b>　食材：<b id="items">0</b></p></section><section class="card"><b>八个摊位</b><p>烟火烧烤 · 月光糖水 · 锅气炒面 · 深夜关东煮<br>海风小海鲜 · 手作饮品车 · 霓虹杂货 · 星签占卜</p></section><script>const stalls=[['烟火烧烤摊','炭火','炭火香料'],['月光糖水铺','月匙','桂花蜜'],['锅气炒面','锅铲','锅气酱油'],['深夜关东煮','阿汤','昆布高汤'],['海风小海鲜','潮生','海盐贝壳'],['手作饮品车','小柚','果香糖浆'],['霓虹杂货铺','阿灯','霓虹玻璃珠'],['星签占卜摊','北斗','星砂']],state=JSON.parse(localStorage.nightMarket||'{"coins":50,"items":{}}');const save=()=>localStorage.nightMarket=JSON.stringify(state),render=()=>{coins.textContent=state.coins;items.textContent=Object.values(state.items).reduce((a,b)=>a+b,0)};visit.onclick=()=>{const s=stalls[Math.floor(Math.random()*stalls.length)];state.coins+=5;state.items[s[2]]=(state.items[s[2]]||0)+1;title.textContent=s[0];text.textContent=`摊主 ${s[1]} 送了你 ${s[2]}，还给了 5 枚夜市币。`;save();render()};render()</script></main></html>
